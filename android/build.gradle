// android/build.gradle
//
// Gradle module for the SignalSeal RN bridge. Groovy DSL (not .kts) so
// it drops into host apps that still use the react-native community
// template's Groovy settings.gradle without ceremony.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Versions come from the consuming app's classpath — we rely on
        // RN's autolinking to inject the Android Gradle Plugin + Kotlin
        // Gradle Plugin, so we don't pin them here.
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
// React Native Gradle Plugin: drives codegen for our `codegenConfig` block
// in package.json. Without this, host apps on the new architecture fail at
// CMake configure with `add_subdirectory ... codegen/jni/ ... not an
// existing directory` because nothing produced the JNI sources.
apply plugin: 'com.facebook.react'

android {
    namespace 'net.signalseal.reactnative'
    compileSdk 34

    defaultConfig {
        minSdk 21
        // No targetSdk on a library module — the host app sets it.

        // Surface new-arch state as a BuildConfig flag for any conditional
        // glue we may need later. RNGP injects the system property when
        // the host enables new arch.
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", String.valueOf(System.getProperty("newArchEnabled") == "true")
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main {
            // Pick up the codegen-generated sources alongside our hand-written
            // Kotlin. The `react` block below points codegen at `../src/`
            // (the TS specs); RNGP writes the generated abstract `Spec` base
            // class into `build/generated/source/codegen/java`.
            java.srcDirs += [
                'src/main/java',
                "${project.buildDir}/generated/source/codegen/java",
            ]
            manifest.srcFile 'src/main/AndroidManifest.xml'
        }
    }
}

react {
    // The codegen `name` from package.json. RNGP uses this for the generated
    // abstract class (`NativeSignalSealSpec`) and JNI library symbols.
    libraryName = "signalsealReactNative"
    codegenJavaPackageName = "net.signalseal.reactnative"
    jsRootDir = file("../src/")
}

repositories {
    google()
    mavenCentral()
    // Consumer apps may additionally declare `mavenLocal()` in their
    // settings.gradle during local SDK development (see the TODO below).
}

dependencies {
    // React Native: '+' is the react-native template convention —
    // Gradle resolves it to whatever version the host app pulled from
    // its node_modules/react-native/android artifact.
    implementation 'com.facebook.react:react-native:+'

    // SignalSeal Android SDK — public Maven Central coordinate. Use `api`
    // so the host app's classpath sees the SDK types (useful if they want
    // direct access to EventType, LogLevel, SignalSealEnvironment, etc.
    // alongside the bridge).
    //
    // Keep this version in lockstep with `package.json#version` of this
    // RN package — the bridge code references native types that may not
    // exist in older SDK versions (e.g., `SignalSealEnvironment` was
    // added in 0.2.0).
    api 'io.github.signalseal:signalseal-android-sdk:0.2.0'
}
